<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>咪的天 - MeowTarot</title>
    <style>
        /* ==========================================
           1. 全局样式与变量定义
           ========================================== */
        @font-face {
            font-family: 'SourceHanSerif';
            src: url('assets/fonts/SourceHanSerif.otf') format('opentype');
            font-display: swap;
        }

        :root {
            --glass-bg: rgba(0, 0, 0, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-color: #FFFFFF;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'SourceHanSerif', serif, sans-serif;
            color: var(--text-color);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* 手机端黄金比例主容器 */
        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            background-color: #0d0d1a;
        }

        /* 视频背景系统 */
        .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
            transition: opacity 0.5s ease;
            opacity: 0;
        }

        .video-bg.active {
            opacity: 1;
        }

        /* 页面视图基础类（叠化转场） */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: none;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.5s ease;
            overflow-y: auto;
            padding: 24px;
        }

        .page.active {
            display: flex;
            opacity: 1;
        }

        /* 经典毛玻璃卡片样式 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        /* 统一样式按钮 */
        .btn {
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 16px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: inline-block;
            text-decoration: none;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        /* ==========================================
           2. 具体页面专属布局
           ========================================== */

        /* 2.1 首页 */
        #page-home {
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 120px;
        }

        .home-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80%;
        }

        /* 2.2 A1 页面 */
        #page-a1 {
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 60px;
        }

        .a1-header-options {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            gap: 12px;
            font-size: 14px;
            z-index: 10;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .checkbox-label input {
            accent-color: #ff9dff;
        }

        .prompt-text {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 40px;
            text-align: center;
        }

        .a1-options {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .custom-input-wrap {
            display: none;
            margin-top: 10px;
            animation: fadeIn 0.3s ease;
        }

        .custom-input-wrap.active {
            display: block;
        }

        .custom-input-wrap input {
            width: 80px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            font-size: 16px;
            margin-right: 10px;
        }

        /* 2.3 A2 页面 */
        #page-a2 {
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 120px;
            gap: 40px;
        }

        /* 2.4 A3 页面 */
        #page-a3 {
            padding-top: 80px;
            justify-content: flex-start;
            align-items: center;
        }

        .a3-status {
            position: absolute;
            top: 24px;
            right: 24px;
            text-align: right;
            font-size: 14px;
            line-height: 1.5;
            z-index: 10;
        }

        .stack-img-container {
            width: 100%;
            margin-top: 10px;
            display: flex;
            justify-content: center;
        }

        .stack-img {
            width: 100%;
            max-width: 100%;
            object-fit: contain;
        }

        .a3-control-area {
            width: 100%;
            margin: 20px 0;
            text-align: center;
        }

        .a3-prompt {
            font-size: 15px;
            margin-bottom: 12px;
            color: #e0e0ff;
        }

        .a3-input-box {
            width: 80%;
            max-width: 250px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            font-size: 18px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        .a3-input-box:focus {
            border-color: #ff9dff;
        }

        /* 抽取的卡牌显示区 */
        .drawn-cards-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            width: 100%;
            margin-top: 20px;
            min-height: 150px;
            padding-bottom: 100px;
        }

        /* 3D 卡牌翻转基础 */
        .card-container {
            width: 90px;
            height: 150px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-back, .card-front {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .card-back {
            background-color: #1a1a2e;
            border: 1px solid var(--glass-border);
        }

        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-front {
            background-color: #000;
            transform: rotateY(180deg);
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 逆位卡牌视觉颠倒效果 */
        .card-front.reversed img {
            transform: rotate(180deg);
        }

        .a3-footer {
            position: absolute;
            bottom: 24px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 0 24px;
        }

        .a3-footer .btn {
            width: 100%;
        }

        /* 2.5 A4 页面 */
        #page-a4 {
            padding-top: 60px;
        }

        .results-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 100px;
        }

        .result-item {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .result-img-container {
            width: 35%;
            aspect-ratio: 9/16;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .result-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-img-container.reversed img {
            transform: rotate(180deg);
        }

        .result-detail {
            width: 65%;
            text-align: left;
            padding: 16px;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ff9dff;
        }

        .result-desc {
            font-size: 13px;
            line-height: 1.5;
            color: #e0e0ff;
        }

        /* A4 底部栏 */
        .a4-footer {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: transparent;
            padding: 16px 24px;
            display: flex;
            gap: 16px;
            border-top: none;
            z-index: 10;
        }

        .a4-footer .btn {
            flex: 1;
        }

        /* 2.6 B1 页面 */
        #page-b1 {
            padding: 0;
            display: none;
        }

        #page-b1.active {
            display: flex;
        }

        /* B1 头部 Emoji 导航栏 */
        .b1-header {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: rgba(13, 13, 26, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 15;
            border-bottom: 1px solid var(--glass-border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .b1-back-btn {
            font-size: 20px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .emoji-nav {
            display: flex;
            gap: 14px;
        }

        .emoji-nav .emoji-item {
            font-size: 20px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s;
            padding: 4px;
        }

        .emoji-nav .emoji-item.active {
            opacity: 1;
            transform: scale(1.15);
        }

        /* B1 横向滑动 Swiper */
        .b1-swiper-container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        .b1-swiper-container::-webkit-scrollbar {
            display: none;
        }

        .b1-slide {
            flex-shrink: 0;
            width: 100%;
            height: 100%;
            scroll-snap-align: start;
            padding: 80px 20px 20px 20px;
            overflow-y: auto;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding-bottom: 60px;
        }

        .grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .grid-img-wrap {
            width: 100%;
            aspect-ratio: 9/16;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .grid-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grid-item span {
            font-size: 12px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* 2.7 B2 页面 - 完美修改：去除高宽裁剪限制，展示100%卡牌原图 */
        #page-b2 {
            padding-top: 80px;
            justify-content: flex-start;
            align-items: center;
        }

        .b2-img-container {
            width: 50%;
            max-width: 220px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .b2-img-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .b2-card-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 24px;
            color: #ff9dff;
        }

        .b2-detail-card {
            width: 100%;
            text-align: left;
            margin-bottom: 100px;
            line-height: 1.8;
            font-size: 14px;
        }

        .b2-section-title {
            font-weight: bold;
            color: #ff9dff;
            margin-top: 14px;
            margin-bottom: 4px;
            border-left: 3px solid #ff9dff;
            padding-left: 8px;
        }

        /* B2 底部栏 */
        .b2-footer {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: transparent;
            padding: 16px 24px;
            display: flex;
            gap: 16px;
            border-top: none;
            z-index: 10;
        }

        .b2-footer .btn {
            flex: 1;
        }

        /* ==========================================
           3. 动效系统 (3D洗牌、弹头报错与新增抽牌过渡飞卡)
           ========================================== */

        /* 3D 洗牌动画叠加层 */
        .shuffle-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 8, 16, 0.95);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .shuffle-overlay.active {
            display: flex;
        }

        .shuffle-deck {
            position: relative;
            width: 120px;
            height: 200px;
            perspective: 1000px;
        }

        .shuffle-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transform-origin: center;
        }

        .shuffle-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 扇形穿插洗牌动画序列 */
        .shuffling .s-card-1 { animation: shuffle-left 1.5s cubic-bezier(0.25, 1, 0.5, 1) infinite; }
        .shuffling .s-card-2 { animation: shuffle-right 1.5s cubic-bezier(0.25, 1, 0.5, 1) infinite; }
        .shuffling .s-card-3 { animation: shuffle-mid-left 1.5s cubic-bezier(0.25, 1, 0.5, 1) infinite; }
        .shuffling .s-card-4 { animation: shuffle-mid-right 1.5s cubic-bezier(0.25, 1, 0.5, 1) infinite; }
        .shuffling .s-card-5 { transform: translateZ(10px); }

        @keyframes shuffle-left {
            0%, 100% { transform: translateX(0) rotate(0deg) translateZ(0); }
            30% { transform: translateX(-160px) rotate(-18deg) translateZ(-20px); }
            70% { transform: translateX(-160px) rotate(-18deg) translateZ(-20px); }
        }

        @keyframes shuffle-right {
            0%, 100% { transform: translateX(0) rotate(0deg) translateZ(0); }
            30% { transform: translateX(160px) rotate(18deg) translateZ(-40px); }
            70% { transform: translateX(160px) rotate(18deg) translateZ(-40px); }
        }

        @keyframes shuffle-mid-left {
            0%, 100% { transform: translateX(0) rotate(0deg) translateZ(0); }
            35% { transform: translateX(-80px) rotate(-8deg) translateZ(-10px); }
            65% { transform: translateX(-80px) rotate(-8deg) translateZ(-10px); }
        }

        @keyframes shuffle-mid-right {
            0%, 100% { transform: translateX(0) rotate(0deg) translateZ(0); }
            35% { transform: translateX(80px) rotate(8deg) translateZ(-30px); }
            65% { transform: translateX(80px) rotate(8deg) translateZ(-30px); }
        }

        /* 3.1 新增：A3 页面抽牌动画层 */
        .draw-anim-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 8, 16, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 150;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .draw-anim-overlay.active {
            display: flex;
        }

        .anim-scene {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* 一排叠放的牌 */
        .anim-stack {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 120px;
            display: flex;
            justify-content: center;
        }

        .anim-stack-card {
            width: 70px;
            height: 110px;
            background-color: #1a1a2e;
            background-image: url('assets/img/card_back.jpg');
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            position: absolute;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        .anim-stack-card:nth-child(1) { transform: rotate(-10deg) translateX(-30px); }
        .anim-stack-card:nth-child(2) { transform: rotate(-5deg) translateX(-15px); }
        .anim-stack-card:nth-child(3) { transform: rotate(0deg); }
        .anim-stack-card:nth-child(4) { transform: rotate(5deg) translateX(15px); }
        .anim-stack-card:nth-child(5) { transform: rotate(10deg) translateX(30px); }

        /* 飞牌出列动画 */
        .flying-card {
            width: 70px;
            height: 110px;
            background-color: #1a1a2e;
            background-image: url('assets/img/card_back.jpg');
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            position: absolute;
            top: 20%;
            left: 50%;
            margin-left: -35px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.6);
            opacity: 0;
        }

        @keyframes fly-out-and-land {
            0% {
                transform: scale(1) translate(0, 0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 1;
                box-shadow: 0 15px 30px rgba(0,0,0,0.7);
            }
            100% {
                transform: scale(1.8) translateY(12vh) rotate(360deg);
                opacity: 1;
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
            }
        }

        .flying-card.animate {
            animation: fly-out-and-land 1.2s cubic-bezier(0.25, 1, 0.3, 1) forwards;
        }

        /* 飘窗错误提示 */
        .toast {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(255, 75, 75, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 75, 75, 0.4);
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            z-index: 200;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- 背景视频层 -->
        <video id="bg-video-home" class="video-bg active" loop muted playsinline poster="assets/img/first_frame/home_first.webp">
            <source src="assets/video/home_bg.mp4" type="video/mp4">
        </video>
        <video id="bg-video-a1-a2" class="video-bg" loop muted playsinline poster="assets/img/first_frame/a1_a2_first.webp">
            <source src="assets/video/a1_a2_bg.mp4" type="video/mp4">
        </video>
        <video id="bg-video-a3-a4" class="video-bg" loop muted playsinline poster="assets/img/first_frame/a3_a4_first.webp">
            <source src="assets/video/a3_a4_bg.mp4" type="video/mp4">
        </video>
        <video id="bg-video-b" class="video-bg" loop muted playsinline poster="assets/img/first_frame/b_first.webp">
            <source src="assets/video/b_bg.mp4" type="video/mp4">
        </video>

        <!-- ==========================================
           4. 页面结构 (DOM)
           ========================================== -->

        <!-- 首页 - 完美修改：增加了下半屏高保真预加载进度条，且初始按钮禁用 -->
        <div id="page-home" class="page active">
            <div class="home-buttons">
                <!-- 高质量毛玻璃预加载条 -->
                <div id="preload-container" style="width: 100%; margin-bottom: 24px; text-align: center;">
                    <div id="preload-text" style="font-size: 14px; margin-bottom: 8px; color: #ff9dff; font-weight: bold;">
                        正在唤醒猫咪魔力... 0% (0.0MB / 21.5MB)
                    </div>
                    <div style="width: 100%; height: 10px; background: rgba(255, 255, 255, 0.08); border-radius: 5px; overflow: hidden; border: 1px solid var(--glass-border);">
                        <div id="preload-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #ff9dff, #8b5cf6); transition: width 0.1s ease-out; border-radius: 5px;"></div>
                    </div>
                </div>

                <button id="btn-start-divination" class="btn glass-card disabled" onclick="goToA1()">开始占卜</button>
                <button id="btn-view-meanings" class="btn glass-card disabled" onclick="goToB1()">查看牌义</button>
            </div>
        </div>

        <!-- A1 页面 -->
        <div id="page-a1" class="page">
            <button class="back-btn" onclick="backToHome()">←</button>

    /* ==========================================
       5.2 智能字段适配器 (抹平中英文 Key 值差异)
       ========================================== */
    function getCardField(card, fieldType) {
        if (!card) return "";
        switch (fieldType) {
            case 'id':
                return card.序号 || card.id || card.index || "";
            case 'name':
                return card.塔罗牌名称 || card.name_cn || card.名称 || card.name || "";
            case 'name_en':
                return card.英文名称 || card.name_en || card.english_name || "";
            case 'astrology':
                return card.占星对应 || card.astrology || card.占星 || "";
            case 'desc':
                return card.解释 || card.desc_cn || card.desc || card.explanation || "";
            case 'desc_en':
                return card.英文解释 || card.desc_en || "";
            case 'upright':
                return card.正位 || card.upright_cn || card.upright || "";
            case 'upright_en':
                return card.英文正位 || card.upright_en || "";
            case 'reversed':
                return card.逆位 || card.reversed_cn || card.reversed || "";
            case 'reversed_en':
                return card.英文逆位 || card.reversed_en || "";
            default:
                return "";
        }
    }

    /* ==========================================
       5.5 A2 到 A3 (3D 洗牌动画过渡)
       ========================================== */
    function startShuffleTransition() {
        const major = document.getElementById('chk-major').checked;
        const minor = document.getElementById('chk-minor').checked;

        if (major && minor) {
            currentPoolRange = { min: 1, max: 80 };
        } else if (major) {
            currentPoolRange = { min: 1, max: 24 };
        } else {
            currentPoolRange = { min: 25, max: 80 };
        }

        const overlay = document.getElementById('shuffle-overlay');
        const deck = document.getElementById('shuffle-deck');
        overlay.classList.add('active');
        deck.classList.add('shuffling');

        generateShuffledDeck();

        setTimeout(() => {
            deck.classList.remove('shuffling');
            overlay.classList.remove('active');
            setupA3Page();
            navigate('page-a3', 'bg-video-a3-a4');
        }, 2000);
    }

    function generateShuffledDeck() {
        const pool = [];
        for (let i = currentPoolRange.min; i <= currentPoolRange.max; i++) {
            pool.push(i);
        }
        
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }

        shuffledDeck = pool.map(id => {
            const orientation = Math.random() < 0.5 ? 1 : -1;
            return id * orientation;
        });
    }

    /* ==========================================
       5.6 A3 核心抽牌交互
       ========================================== */
    function setupA3Page() {
        drawnIndices = [];
        drawnResult = [];
        
        document.getElementById('drawn-count').innerText = "0";
        document.getElementById('pending-count').innerText = selectCount;
        document.getElementById('drawn-cards-container').innerHTML = "";
        document.getElementById('btn-view-meaning').classList.add('disabled');

        const promptEl = document.getElementById('input-prompt-text');
        const rangeMax = currentPoolRange.max - currentPoolRange.min + 1;
        promptEl.innerText = `请输入1-${rangeMax}之间的数字`;

        const input = document.getElementById('card-input');
        input.value = "";
        input.disabled = false;
        input.focus();
    }

    document.getElementById('card-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            processDrawInput();
        }
    });

    function processDrawInput() {
        const inputEl = document.getElementById('card-input');
        const val = parseInt(inputEl.value);
        const rangeMax = currentPoolRange.max - currentPoolRange.min + 1;

        if (isNaN(val) || val < 1 || val > rangeMax) {
            showToast(`请输入 1-${rangeMax} 之间的数字`);
            return;
        }
        if (drawnIndices.includes(val)) {
            showToast("该数字已抽过，请换一个");
            return;
        }

        inputEl.disabled = true;
        drawnIndices.push(val);
        inputEl.value = "";

        const rawVal = shuffledDeck[val - 1]; 
        const isReversed = rawVal < 0;
        const cardId = Math.abs(rawVal);
        const cardData = tarotDatabase.find(c => getCardField(c, 'id') == cardId);

        drawnResult.push({
            inputIndex: val,
            card: cardData,
            isReversed: isReversed,
            isFlipped: false
        });

        // 异步预加载抽到的卡牌大图
        const imgPath = cardData.img || `assets/img/cards/${cardId}.jpg`;
        const preloader = new Image();
        preloader.src = imgPath;

        playFlyingCardAnimation(() => {
            createA3CardUI(drawnResult.length - 1);

            const drawnNum = drawnResult.length;
            document.getElementById('drawn-count').innerText = drawnNum;
            document.getElementById('pending-count').innerText = selectCount - drawnNum;

            if (drawnNum >= selectCount) {
                inputEl.disabled = true;
                checkViewMeaningButtonState();
            } else {
                inputEl.disabled = false;
                inputEl.focus();
            }
        });
    }

    function playFlyingCardAnimation(callback) {
        const animOverlay = document.getElementById('draw-anim-overlay');
        const flyingCard = document.getElementById('flying-card');

        animOverlay.classList.add('active');
        flyingCard.classList.remove('animate');
        void flyingCard.offsetWidth; // 触发回流
        flyingCard.classList.add('animate');

        setTimeout(() => {
            animOverlay.classList.remove('active');
            flyingCard.classList.remove('animate');
            callback();
        }, 1200);
    }

    function createA3CardUI(resultIndex) {
        const res = drawnResult[resultIndex];
        const container = document.getElementById('drawn-cards-container');
        const cardId = getCardField(res.card, 'id');
        const cardName = getCardField(res.card, 'name');
        const imgPath = res.card.img || `assets/img/cards/${cardId}.jpg`;

        const cardHtml = `
            <div class="card-container" id="a3-card-${resultIndex}" onclick="flipCard(${resultIndex})">
                <div class="card-inner">
                    <div class="card-back">
                        <img src="assets/img/card_back.jpg" alt="背面">
                    </div>
                    <div class="card-front ${res.isReversed ? 'reversed' : ''}">
                        <img src="${imgPath}" alt="${cardName}">
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHtml);
    }

    /* ==========================================
       5.7 完美补全：后续核心交互逻辑
       ========================================== */
    function flipCard(idx) {
        const cardEl = document.getElementById(`a3-card-${idx}`);
        if (!cardEl) return;
        
        if (!drawnResult[idx].isFlipped) {
            cardEl.classList.add('flipped');
            drawnResult[idx].isFlipped = true;
            checkViewMeaningButtonState();
        }
    }

    function checkViewMeaningButtonState() {
        const btn = document.getElementById('btn-view-meaning');
        const allFlipped = (drawnResult.length === selectCount) && drawnResult.every(r => r.isFlipped);
        if (allFlipped) {
            btn.classList.remove('disabled');
        } else {
            btn.classList.add('disabled');
        }
    }

    // A4 页面渲染
    function goToA4() {
        const listContainer = document.getElementById('results-list');
        listContainer.innerHTML = "";
        
        drawnResult.forEach((res, index) => {
            const card = res.card;
            const cardId = getCardField(card, 'id');
            const cardName = getCardField(card, 'name');
            const cardEn = getCardField(card, 'name_en');
            const astrology = getCardField(card, 'astrology');
            const direction = res.isReversed ? "逆位" : "正位";
            const keywords = res.isReversed ? getCardField(card, 'reversed') : getCardField(card, 'upright');
            const desc = getCardField(card, 'desc');
            const imgPath = card.img || `assets/img/cards/${cardId}.jpg`;
            
            const itemHtml = `
                <div class="glass-card result-item">
                    <div class="result-img-container ${res.isReversed ? 'reversed' : ''}">
                        <img src="${imgPath}" alt="${cardName}">
                    </div>
                    <div class="result-detail">
                        <div class="result-title">${index + 1}. ${cardName} (${cardEn}) · ${direction}</div>
                        <div class="result-desc" style="margin-bottom: 8px;"><strong>对应：</strong>${astrology}</div>
                        <div class="result-desc" style="margin-bottom: 8px;"><strong>关键词：</strong>${keywords}</div>
                        <div class="result-desc"><strong>牌意：</strong>${desc}</div>
                    </div>
                </div>
            `;
            listContainer.insertAdjacentHTML('beforeend', itemHtml);
        });
        
        navigate('page-a4', 'bg-video-a3-a4');
    }

    // 复制 A4 全套牌意到剪贴板
    function copyAllA4Meaning() {
        let text = "✨ 咪的天 - MeowTarot 占卜结果 ✨\n\n";
        drawnResult.forEach((res, index) => {
            const cardName = getCardField(res.card, 'name');
            const direction = res.isReversed ? "逆位" : "正位";
            const keywords = res.isReversed ? getCardField(res.card, 'reversed') : getCardField(res.card, 'upright');
            const desc = getCardField(res.card, 'desc');
            text += `${index + 1}. 【${cardName}】· ${direction}\n`;
            text += `关键词：${keywords}\n`;
            text += `牌意解释：${desc}\n\n`;
        });
        text += "愿星辰指引你的道路。✨";
        
        navigator.clipboard.writeText(text).then(() => {
            showToast("牌义已成功复制到剪贴板！");
        }).catch(() => {
            showToast("复制失败，请手动选择复制");
        });
    }

    /* ==========================================
       5.8 B1/B2 浏览逻辑与无缝 Swiper 滑动
       ========================================== */
    function goToB1() {
        navigate('page-b1', 'bg-video-b');
        scrollToSlide(0);
    }

    function scrollToSlide(index) {
        const swiper = document.getElementById('b1-swiper');
        const slides = swiper.querySelectorAll('.b1-slide');
        if (slides[index]) {
            swiper.scrollTo({
                left: slides[index].offsetLeft,
                behavior: 'smooth'
            });
        }
        updateEmojiActive(index);
    }

    function updateEmojiActive(activeIndex) {
        const emojis = document.querySelectorAll('.emoji-nav .emoji-item');
        emojis.forEach((emoji, idx) => {
            if (idx === activeIndex) {
                emoji.classList.add('active');
            } else {
                emoji.classList.remove('active');
            }
        });
    }

    // 监听 Swiper 惯性横向滑动
    document.getElementById('b1-swiper').addEventListener('scroll', function() {
        const swiper = this;
        const width = swiper.clientWidth;
        if (width === 0) return;
        const scrollLeft = swiper.scrollLeft;
        const activeIndex = Math.round(scrollLeft / width);
        updateEmojiActive(activeIndex);
    });

    // 渲染 B1 页面的 80 张牌宫格数据
    function initB1Page() {
        const majorGrid = document.getElementById('grid-major');
        const cupsGrid = document.getElementById('grid-cups');
        const pentaclesGrid = document.getElementById('grid-pentacles');
        const swordsGrid = document.getElementById('grid-swords');
        const wandsGrid = document.getElementById('grid-wands');
        
        majorGrid.innerHTML = "";
        cupsGrid.innerHTML = "";
        pentaclesGrid.innerHTML = "";
        swordsGrid.innerHTML = "";
        wandsGrid.innerHTML = "";
        
        tarotDatabase.forEach(card => {
            const id = getCardField(card, 'id');
            const name = getCardField(card, 'name');
            const imgPath = card.img || `assets/img/cards/${id}.jpg`;
            
            const itemHtml = `
                <div class="grid-item" onclick="goToB2(${id})">
                    <div class="grid-img-wrap">
                        <img src="${imgPath}" alt="${name}">
                    </div>
                    <span>${name}</span>
                </div>
            `;
            
            if (id <= 24) {
                majorGrid.insertAdjacentHTML('beforeend', itemHtml);
            } else if (id <= 38) {
                cupsGrid.insertAdjacentHTML('beforeend', itemHtml);
            } else if (id <= 52) {
                pentaclesGrid.insertAdjacentHTML('beforeend', itemHtml);
            } else if (id <= 66) {
                swordsGrid.insertAdjacentHTML('beforeend', itemHtml);
            } else {
                wandsGrid.insertAdjacentHTML('beforeend', itemHtml);
            }
        });
    }

    // 跳转 B2 大图卡面展示页
    let currentB2Card = null;
    function goToB2(cardId) {
        const card = tarotDatabase.find(c => getCardField(c, 'id') == cardId);
        if (!card) return;
        currentB2Card = card;
        
        const name = getCardField(card, 'name');
        const nameEn = getCardField(card, 'name_en');
        const astrology = getCardField(card, 'astrology');
        const desc = getCardField(card, 'desc');
        const upright = getCardField(card, 'upright');
        const reversed = getCardField(card, 'reversed');
        const imgPath = card.img || `assets/img/cards/${cardId}.jpg`;
        
        document.getElementById('b2-card-img').src = imgPath;
        document.getElementById('b2-card-title').innerText = `${name} (${nameEn})`;
        
        const detailContent = `
            <div class="b2-section-title">占星对应</div>
            <div>${astrology || '无'}</div>
            <div class="b2-section-title">牌意解释</div>
            <div>${desc}</div>
            <div class="b2-section-title">正位</div>
            <div>${upright}</div>
            <div class="b2-section-title">逆位</div>
            <div>${reversed}</div>
        `;
        document.getElementById('b2-detail-content').innerHTML = detailContent;
        
        navigate('page-b2', 'bg-video-b');
    }

// B2 复制单张牌释义（中英双语版）
function copySingleB2Meaning() {
    if (!currentB2Card) return;
    const name = getCardField(currentB2Card, 'name');
    const nameEn = getCardField(currentB2Card, 'name_en');
    const astrology = getCardField(currentB2Card, 'astrology');
    const desc = getCardField(currentB2Card, 'desc');
    const upright = getCardField(currentB2Card, 'upright');
    const reversed = getCardField(currentB2Card, 'reversed');
    
    // 获取英文对应的牌义（兼容写法：优先通过 getCardField 获取，若未配置则直接从数据库对象中读取）
    const descEn = getCardField(currentB2Card, 'desc_en') || currentB2Card['英文解释'] || '';
    const uprightEn = getCardField(currentB2Card, 'upright_en') || currentB2Card['英文正位'] || '';
    const reversedEn = getCardField(currentB2Card, 'reversed_en') || currentB2Card['英文逆位'] || '';
    
    let text = `卡牌：【${name}】 (${nameEn})\n`;
    text += `占星：${astrology || '无'}\n\n`;
    
    // 中文释义部分
    text += `【牌意解释】\n${desc}\n\n`;
    text += `【正位】\n${upright}\n\n`;
    text += `【逆位】\n${reversed}\n\n`;
    
    // 分割线
    text += `--------------------------------\n\n`;
    
    // 英文释义部分
    text += `[Card Meaning]\n${descEn}\n\n`;
    text += `[Upright]\n${uprightEn}\n\n`;
    text += `[Reversed]\n${reversedEn}\n\n`;
    
   
    
    navigator.clipboard.writeText(text).then(() => {
        showToast("该卡牌双语释义已成功复制！");
    }).catch(() => {
        showToast("复制失败，请手动选择复制");
    });
}
    /* ==========================================
       5.9 资源预加载算法 (真实加载监听)
       ========================================== */
    function preloadAllAssets() {
        // 创建核心预加载队列：卡背、卡牌叠层占位大图、以及1-80号所有塔罗牌
        const imagesToPreload = [
            'assets/img/card_back.jpg',
            'assets/img/card_stack.webp'
        ];
        for (let i = 1; i <= 80; i++) {
            imagesToPreload.push(`assets/img/cards/${i}.jpg`);
        }

        let loadedCount = 0;
        const total = imagesToPreload.length;

        imagesToPreload.forEach(src => {
            const img = new Image();
            img.onload = img.onerror = () => {
                loadedCount++;
                const percentage = Math.round((loadedCount / total) * 100);
                updatePreloadProgress(percentage);
            };
            img.src = src;
        });
    }

    function updatePreloadProgress(percent) {
        const bar = document.getElementById('preload-bar');
        const text = document.getElementById('preload-text');
        const btnStart = document.getElementById('btn-start-divination');
        const btnMeanings = document.getElementById('btn-view-meanings');

        if (bar) bar.style.width = `${percent}%`;
        
        // 动态高保真等比计算 21.5M 对应的当前体积大小
        const currentMB = ((percent * 21.5) / 100).toFixed(1);
        if (text) {
            if (percent < 100) {
                text.innerText = `正在加载神秘塔罗力量... ${percent}% (${currentMB}MB / 21.5MB)`;
            } else {
                text.innerText = `加载完毕！魔法星之门已开启 100% (21.5MB / 21.5MB)`;
            }
        }

        if (percent === 100) {
            // 启用核心按钮
            if (btnStart) btnStart.classList.remove('disabled');
            if (btnMeanings) btnMeanings.classList.remove('disabled');
            
            // 延时让进度条丝滑淡出
            setTimeout(() => {
                const container = document.getElementById('preload-container');
                if (container) {
                    container.style.transition = 'opacity 0.5s ease, margin 0.5s ease';
                    container.style.opacity = '0';
                    container.style.marginBottom = '0px';
                    setTimeout(() => {
                        container.style.display = 'none';
                    }, 500);
                }
            }, 1000);
        }
    }

    /* ==========================================
       6. 初始化系统入口
       ========================================== */
    window.addEventListener('DOMContentLoaded', () => {
        initB1Page();      // 初始化渲染B1牌仓
        preloadAllAssets(); // 启动真实资源多线程并行预加载
    });
   </script>
